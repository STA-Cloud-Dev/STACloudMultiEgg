name: Build & Push Docker image to GHCR
run-name: "Build Docker • ${{ github.event.head_commit.message || github.ref_name }}"

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set registry prefix (lowercase)
        id: registry
        run: echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry (retry 3 lần)
        env:
          GHCR_USERNAME: ${{ steps.registry.outputs.owner_lower }}
          GHCR_TOKEN: ${{ secrets.USER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin; then
              echo "Login GHCR thành công ở lần thử ${attempt}."
              exit 0
            fi

            echo "Login GHCR thất bại lần ${attempt}. Đợi rồi thử lại..."
            sleep $((attempt * 10))
          done

          echo "Không thể login GHCR sau 3 lần thử." >&2
          exit 1
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner_lower }}/stacloud-free
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker-freemium
          file: ./docker-freemium/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
